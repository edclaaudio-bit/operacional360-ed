<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operacional 360º | Intelligence & AI Hub</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.0.2/marked.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00b4d8; --secondary: #0077b6; --success: #00b894;
            --danger: #ff7675; --warning: #fdcb6e; --dark-blue: #03045e;
            --bg-body: #f8fafc; --sidebar-bg: #ffffff;
            --card-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
            --ai-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-body); font-size: 12px; margin: 0; }
        .sidebar { width: 280px; background: var(--sidebar-bg); height: 100vh; position: fixed; left: 0; top: 0; padding: 25px 20px; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; z-index: 1000; }
        .main-content { margin-left: 280px; padding: 40px; }
        .card-kpi { background: white; border-radius: 18px; padding: 18px; box-shadow: var(--card-shadow); transition: transform 0.2s; cursor: pointer; height: 100%; border: 1px solid #f1f5f9; }
        .card-kpi:hover { transform: translateY(-5px); }
        .kpi-label { font-size: 10px; font-weight: 700; color: #64748b; text-transform: uppercase; }
        .kpi-value { font-size: 20px; font-weight: 800; color: var(--dark-blue); }
        .table-res { background: white; border-radius: 20px; padding: 25px; box-shadow: var(--card-shadow); margin-bottom: 20px; }
        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 3000; flex-direction: column; align-items: center; justify-content: center; }
        .meta-good { color: var(--success) !important; }
        .meta-bad { color: var(--danger) !important; }
        .btn-ai { background: var(--ai-gradient); color: white; border: none; }
        .clickable-name { color: var(--primary); cursor: pointer; font-weight: 700; }
    </style>
</head>
<body>

<div class="loading-overlay" id="loader">
    <div class="spinner-grow text-primary mb-3"></div>
    <h6 class="fw-bold" id="loaderText">Processando no Backend...</h6>
</div>

<div class="sidebar">
    <h4>OP 360º <span style="color: var(--primary);">●</span></h4>
    <div class="small text-muted mb-4">Versão 2.0 (Python Backend)</div>
    
    <div class="mb-4">
        <label class="small fw-bold text-muted mb-2">IMPORTAR CSVs</label>
        <input type="file" id="csvFiles" class="form-control form-control-sm mb-2" multiple>
        <button class="btn btn-primary btn-sm w-100" onclick="uploadFiles()">Alimentar Base via Python</button>
    </div>

    <div class="mb-3">
        <label class="small fw-bold text-muted mb-2">FILTROS</label>
        <input type="date" id="dateIni" class="form-control form-control-sm mb-2">
        <input type="date" id="dateFim" class="form-control form-control-sm mb-2">
        <button class="btn btn-success w-100" onclick="buscarDadosAPI()">Gerar Dashboard</button>
    </div>
    
    <div class="mt-auto pt-3 border-top">
        <span class="text-muted" style="font-size: 9px;">Desenvolvido por Claudio Carvalho</span>
    </div>
</div>

<div class="main-content">
    <div class="row row-cols-1 row-cols-md-4 row-cols-xl-8 g-2 mb-5">
        <div class="col"><div class="card-kpi"><div class="kpi-label">Atendidas</div><div class="kpi-value" id="kAt">0</div></div></div>
        <div class="col"><div class="card-kpi"><div class="kpi-label">NS (85%)</div><div class="kpi-value" id="kNS">0%</div></div></div>
        <div class="col"><div class="card-kpi"><div class="kpi-label">TMA</div><div class="kpi-value" id="kTMA">00:00</div></div></div>
        <div class="col"><div class="card-kpi"><div class="kpi-label">TME</div><div class="kpi-value" id="kTME">00:00</div></div></div>
        <div class="col"><div class="card-kpi"><div class="kpi-label">Abandono</div><div class="kpi-value" id="kAband">0%</div></div></div>
        <div class="col"><div class="card-kpi"><div class="kpi-label">Pesquisa</div><div class="kpi-value" id="kPesq">0%</div></div></div>
        <div class="col"><div class="card-kpi"><div class="kpi-label">CSAT</div><div class="kpi-value" id="kSat">0%</div></div></div>
        <div class="col"><div class="card-kpi"><div class="kpi-label">NPS</div><div class="kpi-value" id="kNPS">0</div></div></div>
    </div>

    <div class="row g-4 mb-5">
        <div class="col-lg-7"><div class="table-res" style="height: 350px;"><canvas id="chartEvol"></canvas></div></div>
        <div class="col-lg-5"><div class="table-res" style="height: 350px;"><canvas id="chartRankingFila"></canvas></div></div>
    </div>

    <div class="table-res">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h6 class="fw-bold mb-0">Performance Individual</h6>
            <div class="d-flex gap-2">
                <button class="btn btn-ai btn-sm px-3" onclick="abrirMenuIA()">AI Hub</button>
                <button class="btn btn-outline-success btn-sm" onclick="exportarExcelPerformance()">Excel</button>
            </div>
        </div>
        <div class="table-responsive">
            <table class="table align-middle text-center" style="font-size: 11px;">
                <thead class="table-light">
                    <tr>
                        <th class="text-start">Atendente</th>
                        <th>Atendidas</th>
                        <th>NS%</th>
                        <th>TMA</th>
                        <th>TMR</th>
                        <th>CSAT</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="modalIA" tabindex="-1"><div class="modal-dialog modal-lg"><div class="modal-content" style="border-radius: 20px;"><div class="modal-header border-0 pb-0"><h5 class="modal-title fw-bold">🚀 IA Insights</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body" id="aiResponseContent"></div></div></div></div>

<script>
    let cacheDadosAtuais = null;
    let chartObjEvol = null;
    let chartObjRanking = null;

    // Função para Upload para o Backend Python
    async function uploadFiles() {
        const files = document.getElementById('csvFiles').files;
        if (files.length === 0) return alert("Selecione os arquivos CSV.");

        const formData = new FormData();
        for (let i = 0; i < files.length; i++) {
            formData.append("files", files[i]);
        }

        document.getElementById('loader').style.display = 'flex';

        try {
            const response = await fetch('/api/processar', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            alert("Base alimentada com sucesso no Python!");
            console.log(data);
        } catch (error) {
            alert("Erro ao processar no servidor.");
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }

    // Função para buscar os cálculos prontos do Python
    async function buscarDadosAPI() {
        const dIni = document.getElementById('dateIni').value;
        const dFim = document.getElementById('dateFim').value;
        
        if(!dIni || !dFim) return alert("Defina o período.");

        document.getElementById('loader').style.display = 'flex';

        try {
            const response = await fetch(`/api/dashboard?inicio=${dIni}&fim=${dFim}`);
            const data = await response.json();
            cacheDadosAtuais = data;
            renderizarDashboard(data);
        } catch (error) {
            alert("Erro ao buscar dados do dashboard.");
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }

    function renderizarDashboard(data) {
        // Preenchimento dos KPIs vindo da API
        document.getElementById('kAt').innerText = data.kpis.atendidas;
        document.getElementById('kNS').innerText = data.kpis.ns + "%";
        document.getElementById('kTMA').innerText = data.kpis.tma;
        document.getElementById('kTME').innerText = data.kpis.tme;
        document.getElementById('kAband').innerText = data.kpis.abandono + "%";
        document.getElementById('kSat').innerText = data.kpis.csat + "%";
        document.getElementById('kNPS').innerText = data.kpis.nps;

        // Tabela de Performance
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = data.performance.map(at => `
            <tr>
                <td class="text-start"><span class="clickable-name">${at.nome}</span></td>
                <td>${at.atendidas}</td>
                <td class="${at.ns >= 85 ? 'meta-good' : 'meta-bad'}">${at.ns}%</td>
                <td>${at.tma}</td>
                <td>${at.tmr}</td>
                <td>${at.csat}%</td>
            </tr>
        `).join('');

        // Atualizar Gráficos (Exemplo simplificado)
        atualizarGraficos(data);
    }

    function atualizarGraficos(data) {
        if(chartObjEvol) chartObjEvol.destroy();
        chartObjEvol = new Chart(document.getElementById('chartEvol'), {
            type: 'bar',
            data: {
                labels: ['NS %', 'CSAT %', 'NPS'],
                datasets: [{
                    data: [data.kpis.ns, data.kpis.csat, data.kpis.nps],
                    backgroundColor: ['#00b4d8', '#00b894', '#03045e']
                }]
            },
            options: { maintainAspectRatio: false }
        });
    }

    // IA HUB (Mantendo integração com sua API do Groq ou movendo para o Backend)
    function abrirMenuIA() {
        const modal = new bootstrap.Modal(document.getElementById('modalIA'));
        document.getElementById('aiResponseContent').innerHTML = `
            <div class="p-3 text-center">
                <h6>A IA analisará os dados calculados pelo Python.</h6>
                <button class="btn btn-ai w-100 mt-3" onclick="gerarInsights()">Gerar Análise Executiva</button>
            </div>
        `;
        modal.show();
    }

    async function gerarInsights() {
        // Aqui você pode enviar o 'cacheDadosAtuais' para o Python processar a IA também!
        alert("Integrando com Llama 3 via Backend...");
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
